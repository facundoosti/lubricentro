services:
  # Base de datos PostgreSQL
  postgres:
    image: pgvector/pgvector:pg15
    container_name: lubricentro_postgres
    environment:
      POSTGRES_DB: lubricentro_development
      POSTGRES_USER: lubricentro
      POSTGRES_PASSWORD: lubricentro123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d
    networks:
      - lubricentro_network
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U lubricentro -d lubricentro_development"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Rails API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: lubricentro_backend
    environment:
      RAILS_ENV: ${RAILS_ENV}
      DATABASE_URL: ${DATABASE_URL}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      AI_API_KEY: ${AI_API_KEY}
      AI_API_URL: ${AI_API_URL}
      AI_MODEL: ${AI_MODEL}
      AI_MODEL_EMBEDDING: ${AI_MODEL_EMBEDDING}
      AI_EMBEDDING_DIMENSION: ${AI_EMBEDDING_DIMENSION}
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - backend_bundle:/usr/local/bundle
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lubricentro_network
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        while ! nc -z postgres 5432; do sleep 1; done &&
        echo 'Database is ready!' &&
        bundle install &&
        rails db:create db:migrate &&
        rm -f tmp/pids/server.pid &&
        rails server -b 0.0.0.0 -p 3000
      "

  # Solid Queue worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: lubricentro_worker
    environment:
      RAILS_ENV: ${RAILS_ENV}
      DATABASE_URL: ${DATABASE_URL}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      JWT_SECRET: ${JWT_SECRET}
      AI_API_KEY: ${AI_API_KEY}
      AI_API_URL: ${AI_API_URL}
      AI_MODEL: ${AI_MODEL}
      AI_MODEL_EMBEDDING: ${AI_MODEL_EMBEDDING}
      AI_EMBEDDING_DIMENSION: ${AI_EMBEDDING_DIMENSION}

    volumes:
      - ./backend:/app
      - backend_bundle:/usr/local/bundle
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - lubricentro_network
    restart: on-failure
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        while ! nc -z postgres 5432; do sleep 1; done &&
        echo 'Running migrations...' &&
        bundle exec rails db:migrate &&
        echo 'Starting Solid Queue worker...' &&
        bundle exec bin/jobs start
      "

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: lubricentro_frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      VITE_APP_NAME: ${VITE_APP_NAME}
      VITE_CABLE_URL: ${VITE_CABLE_URL}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - lubricentro_network
    command: npm run dev -- --host 0.0.0.0

  # Nginx reverse proxy (opcional)
  nginx:
    image: nginx:alpine
    container_name: lubricentro_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - lubricentro_network
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  backend_bundle:
    driver: local
  backend_node_modules:
    driver: local
  frontend_node_modules:
    driver: local

networks:
  lubricentro_network:
    driver: bridge
